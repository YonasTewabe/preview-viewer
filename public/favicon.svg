<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Branching/Merging Icon - Three nodes connected in Y-shape -->
  
  <!-- Top left node -->
  <circle cx="10" cy="8" r="3.5" fill="#3b82f6"/>
  <!-- Top right node -->
  <circle cx="22" cy="8" r="3.5" fill="#3b82f6"/>
  <!-- Bottom center node -->
  <circle cx="16" cy="24" r="3.5" fill="#3b82f6"/>
  
  <!-- Branching lines - Y shape -->
  <!-- Line from top left to merge point -->
  <line x1="10" y1="8" x2="14" y2="16" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Line from top right to merge point -->
  <line x1="22" y1="8" x2="18" y2="16" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Line from merge point to bottom node -->
  <line x1="16" y1="16" x2="16" y2="24" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
</svg>
